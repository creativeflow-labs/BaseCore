services:
  vllm:
    image: vllm/vllm-openai:latest
    command: >
      --model ${VLLM_MODEL_ID}
      --host 0.0.0.0
      --port 8000
      --served-model-name ${VLLM_SERVED_MODEL_NAME}
      --max-model-len 8192
      --gpu-memory-utilization 0.90
    environment:
      HF_HOME: /root/.cache/huggingface
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    ports:
      - "127.0.0.1:8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
